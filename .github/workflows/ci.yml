name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Type-check + build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          # Vercel sets VITE_API_BASE=/api in production (the vercel.json rewrite handles routing).
          # CI uses the direct DuckDNS URL so the build succeeds without Vercel's rewrite layer.
          # Vite bakes this as a string constant — no live API calls happen during the build step.
          VITE_API_BASE: https://investos.duckdns.org
